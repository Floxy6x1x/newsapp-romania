<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Știri - AdInstalGaz</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Știri">
    <link rel="manifest" href="manifest.json">

    <!-- Icons -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23007AFF'/><text y='70' font-size='60' fill='white'>📰</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23007AFF'/><text y='70' font-size='60' fill='white'>📰</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            overflow-x: hidden;
        }
        
        .app-container {
            min-height: 100vh;
            max-width: 100vw;
        }
        
        /* Install Banner */
        .install-banner {
            background: linear-gradient(135deg, #007AFF, #0056CC);
            color: white;
            padding: 12px 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .install-banner.show {
            display: flex;
        }
        
        .install-text {
            font-size: 14px;
            font-weight: 500;
        }
        
        .install-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .dismiss-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        
        /* Header */
        .header {
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 16px;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .menu-btn, .search-btn {
            background: none;
            border: none;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 18px;
        }
        
        .menu-btn:hover, .search-btn:hover {
            background: #f0f0f0;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .search-container {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .search-container.show {
            max-height: 100px;
        }
        
        .search-input {
            width: 100%;
            background: #f8f8f8;
            border: none;
            border-radius: 25px;
            padding: 12px 16px;
            font-size: 16px;
            color: #333;
            outline: none;
        }
        
        /* Categories */
        .categories {
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 12px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .categories::-webkit-scrollbar {
            display: none;
        }
        
        .categories-list {
            display: flex;
            gap: 8px;
            padding: 0 16px;
            min-width: max-content;
        }
        
        .category-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .category-btn.active {
            background: #007AFF;
            color: white;
        }
        
        /* News List */
        .news-list {
            padding: 16px;
        }
        
        .news-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .news-card:active {
            transform: scale(0.98);
        }
        
        .news-image-container {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .bookmark-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .bookmark-btn.bookmarked {
            color: #FFD700;
        }
        
        .news-content {
            padding: 16px;
        }
        
        .news-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        
        .news-summary {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 12px;
        }
        
        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .news-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #999;
        }
        
        .share-btn {
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        /* Side Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .menu-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: white;
            transform: translateX(-100%);
            transition: transform 0.3s;
            z-index: 201;
        }
        
        .menu-overlay.show .side-menu {
            transform: translateX(0);
        }
        
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background: #f8f8f8;
        }
        
        .menu-title {
            font-size: 18px;
            font-weight: bold;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .menu-item:hover {
            background: #f0f0f0;
        }
        
        .menu-item.active {
            background: #e6f3ff;
            color: #007AFF;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            padding: 20px;
            font-size: 14px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .categories-list {
                padding: 0 12px;
            }
            
            .news-list {
                padding: 12px;
            }
            
            .news-card {
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Install Banner -->
        <div class="install-banner" id="installBanner">
            <div class="install-text">📱 Instalează aplicația pentru o experiență mai bună!</div>
            <div>
                <button class="install-btn" id="installBtn">Instalează</button>
                <button class="dismiss-btn" id="dismissBtn">×</button>
            </div>
        </div>

        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <button class="menu-btn" id="menuBtn">☰</button>
                <h1 class="header-title">Știri</h1>
                <button class="search-btn" id="searchBtn">🔍</button>
            </div>
            <div class="search-container" id="searchContainer">
                <input type="text" class="search-input" id="searchInput" placeholder="Caută știri...">
            </div>
        </header>

        <!-- Categories -->
        <div class="categories">
            <div class="categories-list" id="categoriesList">
                <button class="category-btn active" data-category="all">📰 Toate</button>
                <button class="category-btn" data-category="politica">🏛️ Politică</button>
                <button class="category-btn" data-category="sport">⚽ Sport</button>
                <button class="category-btn" data-category="tech">💻 Tech</button>
                <button class="category-btn" data-category="economie">💰 Economie</button>
                <button class="category-btn" data-category="entertainment">🎬 Entertainment</button>
            </div>
        </div>

        <!-- News List -->
        <main class="news-list" id="newsList">
            <div class="loading">Încarcă știrile...</div>
        </main>

        <!-- Side Menu -->
        <div class="menu-overlay" id="menuOverlay">
            <div class="side-menu">
                <div class="menu-header">
                    <h2 class="menu-title">Meniu</h2>
                    <button class="close-btn" id="closeMenuBtn">×</button>
                </div>
                <div class="menu-items">
                    <button class="menu-item active">
                        <span class="menu-item-icon">📰</span>
                        <span class="menu-item-text">Toate știrile</span>
                    </button>
                    <button class="menu-item">
                        <span class="menu-item-icon">⭐</span>
                        <span class="menu-item-text">Favorite</span>
                    </button>
                    <button class="menu-item">
                        <span class="menu-item-icon">📖</span>
                        <span class="menu-item-text">Citite recent</span>
                    </button>
                    <button class="menu-item">
                        <span class="menu-item-icon">⚙️</span>
                        <span class="menu-item-text">Setări</span>
                    </button>
                    <button class="menu-item">
                        <span class="menu-item-icon">ℹ️</span>
                        <span class="menu-item-text">Despre</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample news data - Verifică dacă datele se încarcă
        console.log('Aplicația se încarcă...');
        
        const newsData = [
            {
                id: '1',
                title: 'Noile tehnologii în construcții - Viitorul industriei',
                summary: 'Descoperă cum tehnologiile moderne transformă industria construcțiilor și ce înseamnă acest lucru pentru viitor.',
                category: 'tech',
                image: '🏗️',
                time: '2 ore',
                views: '1.2k',
                bookmarked: false
            },
            {
                id: '2',
                title: 'Creșterea economică în sectorul energetic din România',
                summary: 'Analiza detaliată a performanțelor sectorului energetic și perspectivele de dezvoltare.',
                category: 'economie',
                image: '⚡',
                time: '4 ore',
                views: '856',
                bookmarked: false
            },
            {
                id: '3',
                title: 'Sportivii români la competițiile internaționale',
                summary: 'Rezultate excepționale obținute de reprezentanții României în competițiile recente.',
                category: 'sport',
                image: '🏆',
                time: '6 ore',
                views: '2.1k',
                bookmarked: true
            },
            {
                id: '4',
                title: 'Politici noi pentru susținerea mediului de afaceri',
                summary: 'Guvernul anunță noi măsuri pentru sprijinirea întreprinderilor mici și mijlocii.',
                category: 'politica',
                image: '🏛️',
                time: '8 ore',
                views: '967',
                bookmarked: false
            },
            {
                id: '5',
                title: 'Premierele cinematografice ale acestei săptămâni',
                summary: 'Lista completă a filmelor care se lansează în cinematografele din țară.',
                category: 'entertainment',
                image: '🎬',
                time: '12 ore',
                views: '743',
                bookmarked: false
            }
        ];

        // App state
        let currentCategory = 'all';
        let searchQuery = '';
        let bookmarkedNews = JSON.parse(localStorage.getItem('bookmarkedNews') || '[]');
        let deferredPrompt;

        // DOM elements
        const menuBtn = document.getElementById('menuBtn');
        const searchBtn = document.getElementById('searchBtn');
        const searchContainer = document.getElementById('searchContainer');
        const searchInput = document.getElementById('searchInput');
        const categoriesList = document.getElementById('categoriesList');
        const newsList = document.getElementById('newsList');
        const menuOverlay = document.getElementById('menuOverlay');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');
        const dismissBtn = document.getElementById('dismissBtn');

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM încărcat, inițializez aplicația...');
            renderNews();
            setupEventListeners();
            
            // Verifică dacă elementele există
            console.log('Menu button:', menuBtn);
            console.log('Search button:', searchBtn);
            console.log('News list:', newsList);
            
            // Înlocuiește mesajul de loading cu o verificare
            setTimeout(() => {
                if (newsList.innerHTML.includes('Încarcă știrile...')) {
                    console.log('Forțez rendering-ul știrilor...');
                    renderNews();
                }
            }, 1000);
        });

        // Event listeners - Simplificate și reparate
        function setupEventListeners() {
            console.log('Setting up event listeners...');
            
            // Menu functionality
            if (menuBtn && menuOverlay) {
                menuBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    console.log('Menu button clicked');
                    menuOverlay.classList.toggle('show');
                });
            }

            if (closeMenuBtn && menuOverlay) {
                closeMenuBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    menuOverlay.classList.remove('show');
                });
            }

            if (menuOverlay) {
                menuOverlay.addEventListener('click', (e) => {
                    if (e.target === menuOverlay) {
                        menuOverlay.classList.remove('show');
                    }
                });
            }

            // Search functionality
            if (searchBtn && searchContainer) {
                searchBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    console.log('Search button clicked');
                    searchContainer.classList.toggle('show');
                    if (searchContainer.classList.contains('show') && searchInput) {
                        searchInput.focus();
                    }
                });
            }

            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase();
                    console.log('Search query:', searchQuery);
                    renderNews();
                });
            }

            // Categories functionality
            if (categoriesList) {
                categoriesList.addEventListener('click', (e) => {
                    if (e.target.classList.contains('category-btn')) {
                        console.log('Category clicked:', e.target.dataset.category);
                        
                        // Update active category
                        document.querySelectorAll('.category-btn').forEach(btn => {
                            btn.classList.remove('active');
                        });
                        e.target.classList.add('active');
                        
                        currentCategory = e.target.dataset.category;
                        renderNews();
                    }
                });
            }

            console.log('Event listeners set up successfully!');
        }

        // Render news - Funcție îmbunătățită cu debugging
        function renderNews() {
            console.log('Rendering news...', {
                currentCategory,
                searchQuery,
                totalNews: newsData.length
            });
            
            const filteredNews = newsData.filter(news => {
                const matchesCategory = currentCategory === 'all' || news.category === currentCategory;
                const matchesSearch = searchQuery === '' || 
                    news.title.toLowerCase().includes(searchQuery) ||
                    news.summary.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            console.log('Filtered news:', filteredNews.length);

            if (filteredNews.length === 0) {
                newsList.innerHTML = '<div class="loading">Nu au fost găsite știri pentru această căutare.</div>';
                return;
            }

            const newsHTML = filteredNews.map(news => `
                <article class="news-card" onclick="openNews('${news.id}')">
                    <div class="news-image-container">
                        <div style="font-size: 64px;">${news.image}</div>
                        <div class="category-badge">${getCategoryLabel(news.category)}</div>
                        <button class="bookmark-btn ${bookmarkedNews.includes(news.id) ? 'bookmarked' : ''}" 
                                onclick="event.stopPropagation(); toggleBookmark('${news.id}')">
                            ${bookmarkedNews.includes(news.id) ? '★' : '☆'}
                        </button>
                    </div>
                    <div class="news-content">
                        <h2 class="news-title">${news.title}</h2>
                        <p class="news-summary">${news.summary}</p>
                        <div class="news-footer">
                            <div class="news-stats">
                                <span>⏰ ${news.time}</span>
                                <span>👁️ ${news.views}</span>
                            </div>
                            <button class="share-btn" onclick="event.stopPropagation(); shareNews('${news.id}')">📤</button>
                        </div>
                    </div>
                </article>
            `).join('');
            
            newsList.innerHTML = newsHTML;
            console.log('News rendered successfully!');
        }

        // Helper functions
        function getCategoryLabel(category) {
            const labels = {
                'politica': 'Politică',
                'sport': 'Sport',
                'tech': 'Tech',
                'economie': 'Economie',
                'entertainment': 'Entertainment'
            };
            return labels[category] || 'General';
        }

        function toggleBookmark(newsId) {
            console.log('Toggle bookmark for:', newsId);
            const index = bookmarkedNews.indexOf(newsId);
            if (index > -1) {
                bookmarkedNews.splice(index, 1);
            } else {
                bookmarkedNews.push(newsId);
            }
            
            try {
                localStorage.setItem('bookmarkedNews', JSON.stringify(bookmarkedNews));
            } catch (e) {
                console.log('LocalStorage not available:', e);
            }
            
            renderNews();
        }

        function shareNews(newsId) {
            console.log('Share news:', newsId);
            const news = newsData.find(n => n.id === newsId);
            if (!news) return;
            
            if (navigator.share) {
                navigator.share({
                    title: news.title,
                    text: news.summary,
                    url: window.location.href
                }).catch(err => console.log('Error sharing:', err));
            } else {
                // Fallback for browsers that don't support Web Share API
                const shareText = `${news.title}\n\n${news.summary}`;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(shareText).then(() => {
                        alert('Știrea a fost copiată în clipboard!');
                    }).catch(() => {
                        alert('Nu s-a putut copia textul');
                    });
                } else {
                    alert('Partajare nu este disponibilă în acest browser');
                }
            }
        }

        function openNews(newsId) {
            console.log('Open news:', newsId);
            const news = newsData.find(n => n.id === newsId);
            if (news) {
                alert(`📰 ${news.title}\n\n${news.summary}\n\n🕒 ${news.time} • 👁️ ${news.views} vizualizări`);
                // Here you would navigate to full article page
            }
        }

        // PWA functionality
        function setupPWA() {
            // Show install banner
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                
                if (!localStorage.getItem('installBannerDismissed')) {
                    installBanner.classList.add('show');
                }
            });

            // Handle app install
            window.addEventListener('appinstalled', () => {
                console.log('PWA was installed');
                installBanner.classList.remove('show');
            });
        }

        // Service Worker registration
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then((registration) => {
                        console.log('SW registered: ', registration);
                    })
                    .catch((registrationError) => {
                        console.log('SW registration failed: ', registrationError);
                    });
            }
        }
    </script>
</body>
</html>
